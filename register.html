<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EXOTICA Exotic Car Rental</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link id="bootstrap-css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-deep d-flex align-items-center vh-100">

    <div class="auth-toggles-wrapper">
        <div class="rtl-toggle" id="rtl-toggle" title="Switch Language Direction">
            <i class="bi bi-translate"></i>
        </div>
        <div class="theme-toggle" id="theme-toggle">
            <i class="bi bi-moon-fill"></i>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <a href="index.html" class="opacity-75"><img src="assets/images/logo.svg" alt="EXOTICA"
                            width="200"></a>
                </div>
                <div class="p-4 auth-card shadow-lg">
                    <h2 class="mb-4 text-center">Join the Elite</h2>
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="small mb-1">First Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small mb-1">Last Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small mb-1">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small mb-1">Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="small mb-1">Confirm Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="terms" required>
                            <label class="form-check-label small opacity-75" for="terms">
                                I agree to the <a href="#" class="text-gold">Terms of Service</a> and <a href="#"
                                    class="text-gold">Verification Policy</a>.
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Create Account</button>

                        <div class="auth-separator">OR</div>

                        <div class="social-login-grid mb-4">
                            <a href="#" class="btn-social google">
                                <i class="bi bi-google"></i> Continue with Google
                            </a>
                            <a href="#" class="btn-social apple">
                                <i class="bi bi-apple"></i> Continue with Apple
                            </a>
                            <a href="#" class="btn-social facebook">
                                <i class="bi bi-facebook"></i> Continue with Facebook
                            </a>
                        </div>

                        <p class="text-center small m-0">Already a member? <a href="login.html"
                                class="text-gold text-decoration-none">Sign In</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
