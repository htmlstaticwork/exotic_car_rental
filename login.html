<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EXOTICA Exotic Car Rental</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link id="bootstrap-css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-deep d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-5">
                    <a href="index.html"><img src="assets/images/logo.svg" alt="EXOTICA" width="180"></a>
                </div>
                <div class="p-5 bg-dark border border-secondary text-white shadow-lg">
                    <h2 class="mb-4 text-center">Welcome Back</h2>
                    <p class="text-center opacity-50 mb-5">Access your dashboard and manage bookings.</p>
                    <form action="dashboard.html">
                        <div class="mb-3">
                            <label class="small mb-1">Email Address</label>
                            <input type="email" class="form-control bg-transparent border-secondary text-white" required>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between mb-1">
                                <label class="small">Password</label>
                                <a href="#" class="small text-gold text-decoration-none">Forgot?</a>
                            </div>
                            <input type="password" class="form-control bg-transparent border-secondary text-white" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Sign In</button>
                        <p class="text-center small opacity-50 m-0">Don't have an account? <a href="register.html" class="text-gold text-decoration-none">Create One</a></p>
                    </form>
                </div>
                <div class="text-center mt-5">
                    <a href="index.html" class="text-white text-decoration-none small opacity-25">← BACK TO WEBSITE</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
